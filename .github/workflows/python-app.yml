name: Python App

on:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    review:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install Dependencies
              run: python -m pip install --upgrade pip
            - name: Run Review Script
              run: python ./script/review.py

              
